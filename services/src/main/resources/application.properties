#Thu May 21 13:08:25 UTC 2026
micronaut.application.name=services
micronaut.server.port=8090

# Enable CORS globally
micronaut.server.cors.enabled=true

# Allowed Origins (Replace with your actual frontend URLs)
# micronaut.server.cors.configurations.web.allowed-origins[0]=http://192.168.200.10
micronaut.server.cors.configurations.web.allowed-origins[0]=http://localhost:8080

# Allowed HTTP Methods
micronaut.server.cors.configurations.web.allowed-methods[0]=GET
micronaut.server.cors.configurations.web.allowed-methods[1]=POST
micronaut.server.cors.configurations.web.allowed-methods[2]=PUT
micronaut.server.cors.configurations.web.allowed-methods[3]=DELETE
micronaut.server.cors.configurations.web.allowed-methods[4]=OPTIONS

# Allowed Headers
micronaut.server.cors.configurations.web.allowed-headers[0]=Content-Type
micronaut.server.cors.configurations.web.allowed-headers[1]=Authorization
micronaut.server.cors.configurations.web.allowed-headers[2]=X-Requested-With

# Exposed Headers and Credentials
micronaut.server.cors.configurations.web.exposed-headers[0]=Content-Type
micronaut.server.cors.configurations.web.exposed-headers[1]=Authorization
micronaut.server.cors.configurations.web.allow-credentials=true
micronaut.server.cors.configurations.web.max-age=1800
